<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f5f7fb;
      }
      .card {
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        width: min(90vw, 360px);
      }
      input {
        display: block;
        width: 100%;
        margin: 10px 0;
        padding: 10px 12px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        margin-top: 8px;
      }
      #status {
        margin-top: 10px;
        color: #475569;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Portal Login</h2>
      <input id="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button onclick="login()">Login</button>
      <p id="status">Sign in with your Firebase account.</p>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signInWithEmailAndPassword,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDNdgYedYk2yI3VsH58Ao3HF1A1UWMamD0",
        authDomain: "sanity-blog-auth.firebaseapp.com",
        projectId: "sanity-blog-auth",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.replace("index.html");
        }
      });

      window.login = async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const status = document.getElementById("status");

        if (!email || !password) {
          status.textContent = "Please enter both email and password.";
          return;
        }

        status.textContent = "Signing in...";

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.replace("index.html");
        } catch (error) {
          status.textContent = error.message || "Sign-in failed.";
        }
      };
    </script>
  </body>
</html>
