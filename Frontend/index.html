<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Blog</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      /*  */
      :root {
        --bg: #f9f9f9;
        --surface: #ffffff;
        --border: #e5e5e5;
        --text: #1a1a1a;
        --text-muted: #666;
        --text-faint: #999;
        --tag-border: #ddd;
        --tag-color: #555;
        --tag-hover-bg: #f0f0f0;
        --card-hover-border: #bbb;
        --footer-border: #f0f0f0;
        --toggle-bg: #f0f0f0;
        --toggle-color: #333;
      }

      [data-theme="dark"] {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --text: #e8e8e8;
        --text-muted: #aaa;
        --text-faint: #666;
        --tag-border: #444;
        --tag-color: #bbb;
        --tag-hover-bg: #2a2a2a;
        --card-hover-border: #555;
        --footer-border: #2a2a2a;
        --toggle-bg: #2a2a2a;
        --toggle-color: #e8e8e8;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        transition:
          background 0.2s,
          color 0.2s;
      }

      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 18px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      header h1 {
        font-size: 1.4rem;
        font-weight: 700;
        color: var(--text);
      }

      .theme-toggle {
        background: var(--toggle-bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 6px 14px;
        cursor: pointer;
        font-size: 0.82rem;
        color: var(--toggle-color);
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.2s;
      }
      .theme-toggle:hover {
        border-color: var(--card-hover-border);
      }

      .layout {
        display: flex;
        gap: 32px;
        max-width: 1280px;
        margin: 40px auto;
        padding: 0 24px;
        align-items: flex-start;
      }

      /* SIDEBAR */
      aside {
        width: 240px;
        flex-shrink: 0;
        position: sticky;
        top: 72px;
      }

      .filters-label {
        font-size: 0.82rem;
        color: var(--text-faint);
        margin-bottom: 14px;
        padding: 0 4px;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .sidebar-section {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        margin-bottom: 14px;
        overflow: hidden;
      }

      .sidebar-toggle {
        width: 100%;
        background: none;
        border: none;
        color: var(--text);
        font-size: 0.88rem;
        font-weight: 600;
        padding: 13px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        cursor: pointer;
      }
      .sidebar-toggle:hover {
        background: var(--tag-hover-bg);
      }
      .sidebar-toggle .arrow {
        transition: transform 0.2s;
        font-size: 0.7rem;
        color: var(--text-faint);
      }
      .sidebar-toggle.open .arrow {
        transform: rotate(180deg);
      }

      .sidebar-body {
        display: none;
        padding: 4px 12px 12px;
        flex-direction: column;
        gap: 6px;
      }
      .sidebar-body.open {
        display: flex;
      }

      .tags-wrap {
        display: none;
        flex-wrap: wrap;
        gap: 6px;
        padding: 4px 12px 12px;
      }
      .tags-wrap.open {
        display: flex;
      }

      .filter-btn {
        background: transparent;
        border: 1px solid var(--tag-border);
        border-radius: 20px;
        color: var(--tag-color);
        padding: 5px 12px;
        font-size: 0.8rem;
        cursor: pointer;
        text-align: left;
        transition: all 0.15s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        border-color: var(--text);
        color: var(--text);
        background: var(--tag-hover-bg);
      }

      .tag-filter {
        background: transparent;
        border: 1px solid var(--tag-border);
        border-radius: 20px;
        color: var(--tag-color);
        padding: 3px 10px;
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.15s;
      }
      .tag-filter:hover,
      .tag-filter.active {
        border-color: var(--text);
        color: var(--text);
        background: var(--tag-hover-bg);
      }

      /* MAIN */
      .main-content {
        flex: 1;
        min-width: 0;
      }

      .content-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .content-header h2 {
        font-size: 1.8rem;
        font-weight: 700;
      }
      .post-count {
        color: var(--text-muted);
        font-size: 0.88rem;
        margin-top: 4px;
      }

      /* GRID */
      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }
      @media (max-width: 1000px) {
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
        aside {
          display: none;
        }
        .layout {
          padding: 0 16px;
        }
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.2s,
          transform 0.2s,
          box-shadow 0.2s;
      }
      .card:hover {
        border-color: var(--card-hover-border);
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.07);
      }
      .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        display: block;
      }
      .card-body {
        padding: 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card-cats {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .card-cat {
        border: 1px solid var(--tag-border);
        border-radius: 20px;
        padding: 2px 10px;
        font-size: 0.72rem;
        color: var(--tag-color);
        background: transparent;
      }
      .card h3 {
        font-size: 0.95rem;
        font-weight: 600;
        line-height: 1.4;
        color: var(--text);
        flex: 1;
      }
      .card p {
        font-size: 0.82rem;
        color: var(--text-muted);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
        padding-top: 10px;
        border-top: 1px solid var(--footer-border);
      }
      .author {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .author-avatar {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--tag-hover-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: var(--text-muted);
        flex-shrink: 0;
        overflow: hidden;
      }
      .author-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .author-name {
        font-size: 0.78rem;
        color: var(--text-muted);
      }
      .card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .reading-time {
        font-size: 0.75rem;
        color: var(--text-muted);
      }
      .date-str {
        font-size: 0.75rem;
        color: var(--text-faint);
      }

      #status {
        text-align: center;
        color: var(--text-faint);
        margin-top: 60px;
        grid-column: 1/-1;
      }
    </style>
  </head>
  <body>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDNdgYedYk2yI3VsH58Ao3HF1A1UWMamD0",
        authDomain: "sanity-blog-auth.firebaseapp.com",
        projectId: "sanity-blog-auth",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // ✅ block UI early
      document.body.style.display = "none";

      onAuthStateChanged(auth, (user) => {
        if (user) {
          window.location.href = "index.html";
        }
      });
    </script>
    <header>
      <h1>My Blog</h1>
      <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
        🌙 Dark
      </button>
    </header>

    <div class="layout">
      <aside id="sidebar">
        <div class="filters-label">▼ Filters</div>

        <div class="sidebar-section">
          <button class="sidebar-toggle open" onclick="toggleSection(this)">
            Categories <span class="arrow">▲</span>
          </button>
          <div class="sidebar-body open" id="cat-list"></div>
        </div>

        <div class="sidebar-section">
          <button
            class="sidebar-toggle open"
            onclick="toggleSection(this, true)"
          >
            Tags <span class="arrow">▲</span>
          </button>
          <div class="tags-wrap open" id="tag-list"></div>
        </div>
      </aside>

      <div class="main-content">
        <div class="content-header">
          <div>
            <h2>All Posts</h2>
            <p class="post-count" id="post-count"></p>
          </div>
        </div>
        <div class="grid" id="posts">
          <p id="status">Loading posts...</p>
        </div>
      </div>
    </div>

    <script>
      const PROJECT_ID = "xsd8o1za";
      const DATASET = "production";

      const QUERY = encodeURIComponent(`*[_type == "post"]{
      _id, title, slug, publishedAt, _createdAt, excerpt, readingTime,
      "authorName": author->name,
      "authorImage": author->image.asset->url,
      "imageUrl": mainImage.asset->url,
      "categories": categories[]->title,
      tags, body
    } | order(_createdAt desc)`);

      const API_URL = `https://${PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${DATASET}?query=${QUERY}`;

      let allPosts = [];
      let activeCategory = null;
      let activeTag = null;

      // Theme toggle
      function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.getAttribute("data-theme") === "dark";
        html.setAttribute("data-theme", isDark ? "light" : "dark");
        document.getElementById("theme-btn").textContent = isDark
          ? "🌙 Dark"
          : "☀️ Light";
        localStorage.setItem("theme", isDark ? "light" : "dark");
      }

      // Load saved theme
      const savedTheme = localStorage.getItem("theme") || "light";
      document.documentElement.setAttribute("data-theme", savedTheme);
      if (savedTheme === "dark")
        document.getElementById("theme-btn").textContent = "☀️ Light";

      function timeAgo(dateStr) {
        const diff = Date.now() - new Date(dateStr).getTime();
        const minutes = Math.floor(diff / 60000);
        const hours = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);

        if (minutes < 60) return `${minutes} min ago`;
        if (hours < 24) return `${hours} hr ago`;

        return new Date(dateStr).toLocaleDateString("en-US", {
          year: "numeric",
          month: "long",
          day: "numeric",
        });
      }

      function initials(name) {
        if (!name) return "?";
        return name
          .split(" ")
          .map((n) => n[0])
          .join("")
          .toUpperCase()
          .slice(0, 2);
      }

      function renderPosts(posts) {
        const container = document.getElementById("posts");
        document.getElementById("post-count").textContent =
          `${posts.length} post${posts.length !== 1 ? "s" : ""} found`;
        if (!posts.length) {
          container.innerHTML = '<p id="status">No posts found.</p>';
          return;
        }
        container.innerHTML = posts
          .map(
            (post) => `
        <a class="card" href="post.html?slug=${post.slug?.current}">
          ${post.imageUrl ? `<img src="${post.imageUrl}" alt="${post.title}" />` : ""}
          <div class="card-body">
            ${
              post.categories?.length
                ? `
              <div class="card-cats">
                ${post.categories.map((cat) => `<span class="card-cat">${cat}</span>`).join("")}
              </div>`
                : ""
            }
            <h3>${post.title}</h3>
            <p>${post.excerpt || post.body?.[0]?.children?.[0]?.text || ""}</p>
            <div class="card-footer">
              <div class="author">
                <div class="author-avatar">
                  ${post.authorImage ? `<img src="${post.authorImage}" alt="${post.authorName}" />` : initials(post.authorName)}
                </div>
                <span class="author-name">${post.authorName || "Unknown"}</span>
              </div>
              <div class="card-meta">
                ${post.readingTime ? `<span class="reading-time">⏱ ${post.readingTime} min</span>` : ""}
                <span class="date-str">📅 ${timeAgo(post.publishedAt || post._createdAt)}</span>
              </div>
            </div>
          </div>
        </a>
      `,
          )
          .join("");
      }

      function filterPosts() {
        let filtered = allPosts;
        if (activeCategory)
          filtered = filtered.filter((p) =>
            p.categories?.includes(activeCategory),
          );
        if (activeTag)
          filtered = filtered.filter((p) => p.tags?.includes(activeTag));
        renderPosts(filtered);
      }

      function buildSidebar(posts) {
        const cats = [...new Set(posts.flatMap((p) => p.categories || []))];
        const tags = [...new Set(posts.flatMap((p) => p.tags || []))];

        document.getElementById("cat-list").innerHTML = cats
          .map(
            (cat) =>
              `<button class="filter-btn" onclick="filterByCategory('${cat}', this)">${cat}</button>`,
          )
          .join("");

        document.getElementById("tag-list").innerHTML = tags
          .map(
            (tag) =>
              `<button class="tag-filter" onclick="filterByTag('${tag}', this)">#${tag}</button>`,
          )
          .join("");

        if (!cats.length && !tags.length) {
          document.getElementById("sidebar").style.display = "none";
        }
      }

      function filterByCategory(cat, btn) {
        activeCategory = activeCategory === cat ? null : cat;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        if (activeCategory) btn.classList.add("active");
        filterPosts();
      }

      function filterByTag(tag, btn) {
        activeTag = activeTag === tag ? null : tag;
        document
          .querySelectorAll(".tag-filter")
          .forEach((b) => b.classList.remove("active"));
        if (activeTag) btn.classList.add("active");
        filterPosts();
      }

      function toggleSection(btn, isTagSection = false) {
        btn.classList.toggle("open");
        const body = btn.nextElementSibling;
        if (isTagSection) {
          body.classList.toggle("open");
        } else {
          body.classList.toggle("open");
        }
      }

      fetch(API_URL)
        .then((res) => res.json())
        .then((data) => {
          allPosts = data.result || [];
          buildSidebar(allPosts);
          renderPosts(allPosts);
        })
        .catch(() => {
          document.getElementById("status").textContent =
            "Failed to load posts.";
        });
    </script>
  </body>
</html>
